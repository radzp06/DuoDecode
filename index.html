<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ AICreator Flow: Wardrobe Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: #2d3748;
        }
        .app-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border: none;
        }
        .gradient-header {
            background: linear-gradient(45deg, #ff4b4b, #ff7676);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }
        .btn-submit {
            background: linear-gradient(45deg, #ff4b4b, #ff6b6b);
            color: white;
            font-weight: 600;
            border: none;
            padding: 14px;
            border-radius: 8px;
            width: 100%;
            box-shadow: 0 4px 12px rgba(255, 75, 75, 0.2);
        }
        .btn-submit:hover {
            color: white;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="card app-card p-4 p-md-5">
                    
                    <div class="text-center mb-4">
                        <h1 class="display-5 gradient-header mb-1">⚡ AICreator Flow</h1>
                        <p class="text-muted">Analyze Wardrobe Assets & Optimize Your Look Archetype</p>
                    </div>

                    <form id="workflowForm">
                        <div class="mb-4">
                            <label for="occasion" class="form-label fw-bold">1. Where are you going / What is the occasion?</label>
                            <input type="text" class="form-control form-control-lg" id="occasion" placeholder="e.g., Goa Vacation, Corporate Pitch..." required>
                        </div>

                        <div class="mb-4">
                            <label for="clothes" class="form-label fw-bold">2. What clothes are you carrying right now?</label>
                            <textarea class="form-control" id="clothes" rows="5" placeholder="e.g., white linen shirt, denim jacket, casual blue jeans..." required></textarea>
                        </div>

                        <div class="mt-4">
                            <button type="submit" class="btn btn-submit btn-lg shadow-sm">Generate My Outfit Flow Pipeline →</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('workflowForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert("🚀 Routing wardrobe text vectors straight to the Gemini inference layers...");
        });
    </script>
</body>
</html>
