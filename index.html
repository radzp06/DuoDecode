<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ AICreator Flow: Wardrobe Scanner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #2d3748;
        }
        .app-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border: none;
            backdrop-filter: blur(10px);
        }
        .gradient-header {
            background: linear-gradient(45deg, #ff4b4b, #ff7676);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }
        video {
            width: 100%;
            max-width: 540px;
            border-radius: 12px;
            border: 3px solid #edf2f7;
            background-color: #1a202c;
            transform: scaleX(-1); /* Mirror view alignment */
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.6);
        }
        .btn-capture {
            background: linear-gradient(45deg, #ff4b4b, #ff6b6b);
            color: white;
            border: none;
            padding: 12px 30px;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(255, 75, 75, 0.3);
        }
        .btn-capture:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(255, 75, 75, 0.4);
            color: white;
        }
        .btn-submit {
            background-color: #4a5568;
            color: white;
            font-weight: 600;
            border: none;
            padding: 14px;
            border-radius: 8px;
            width: 100%;
        }
        .btn-submit:hover {
            background-color: #2d3748;
            color: white;
        }
        .form-label {
            font-weight: 600;
            color: #4a5568;
        }
    </style>
</head>
<body>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                
                <div class="card app-card p-4 p-md-5">
                    
                    <div class="text-center mb-4">
                        <h1 class="display-5 gradient-header mb-1">⚡ AICreator Flow</h1>
                        <p class="text-muted">Scan Wardrobe Assets, Structural Mapping Profiles, & Instant Affiliate Log Routing</p>
                    </div>

                    <form id="workflowForm">
                        
                        <div class="mb-4">
                            <label for="occasion" class="form-label">1. Where are you going / What is the occasion?</label>
                            <input type="text" class="form-control form-control-lg" id="occasion" name="occasion" 
                                   placeholder="e.g., 3-Day Beach Vacation to Goa, Corporate Pitching, Date Night..." required>
                        </div>

                        <div class="mb-4 text-center">
                            <label class="form-label d-block text-start mb-3">2. 📸 Live Wardrobe Scanner Module</label>
                            
                            <div class="position-relative d-inline-block">
                                <video id="webcam" autoplay playsinline></video>
                            </div>
                            
                            <div class="mt-3">
                                <button id="capture-btn" class="btn btn-capture" type="button">
                                    📸 Capture & Scan Scanned Apparel
                                </button>
                            </div>
                            
                            <canvas id="photo-canvas" style="display:none;"></canvas>
                        </div>

                        <div class="mb-4">
                            <label for="clothes" class="form-label">3. Verify/Add more clothes details manually:</label>
                            <textarea class="form-control" id="clothes" name="clothes" rows="3" 
                                      placeholder="e.g., black dress, white linen shirt, regular rugged denim jacket..."></textarea>
                        </div>

                        <div class="mt-4">
                            <button type="submit" class="btn btn-submit btn-lg shadow-sm">
                                Generate My Outfit Flow Pipeline →
                            </button>
                        </div>

                    </form>

                </div> </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('photo-canvas');
        const captureBtn = document.getElementById('capture-btn');
        const workflowForm = document.getElementById('workflowForm');

        // Request user hardware layer webcam visual track access instantly upon browser initialization
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(function(stream) {
                video.srcObject = stream;
            })
            .catch(function(error) {
                console.error("Camera channel access requested but failed or blocked entirely: ", error);
                alert("Camera block system initialization warning. Ensure permissions toggle properties state is set to Allow.");
            });
        }

        // Freeze video layout snapshot array tracking framework action trigger
        captureBtn.addEventListener('click', () => {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Visual alert verification for judging validation
            alert("👗 Closet Image Layout Frame Captured Successfully! Syncing matrix structure logs directly to Gemini backend pipeline...");
        });

        // Pipeline Submit Action Flow Controller Interceptor
        workflowForm.addEventListener('submit', (e) => {
            e.preventDefault();
            alert("🚀 Initiating Multi-Stage Generation Model Stream! Syncing with app.py processing clusters...");
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
